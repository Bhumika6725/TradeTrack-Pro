<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Trade | TradeTrack Pro</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/addTrade.css">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            <h2>📈 TradeTrack Pro</h2>

        </div>

        <ul class="menu">

            <li>
                <a href="dashboard.html">🏠 Dashboard</a>
            </li>

            <li class="active">
                <a href="addTrade.html">➕ Add Trade</a>
            </li>

            <li>
                <a href="history.html">📜 Trade History</a>
            </li>

            <li>
                <a href="analytics.html">📊 Analytics</a>
            </li>

            <l>
                <li><a href="riskCalculator.html">💰 Risk Calculator</a></li>
            </li>

            <li>
                <a href="settings.html">⚙️ Settings</a>
            </li>

        </ul>

    </aside>

    <!-- Main -->

    <main class="main">

        <div class="page-title">

            <h1>Add New Trade</h1>

            <p>Record every trade. Improve every day.</p>

        </div>

        <form id="tradeForm">

            <div class="grid">

                <!-- Stock -->

                <div class="input-box">

                    <label>Index / Stock Name</label>

                    <input
                        type="text"
                        id="stock"
                        placeholder="Example : Nifty , TCS"
                        required>

                </div>

                <!-- Trade Type -->

                <div class="input-box">

                    <label>Trade Type</label>

                    <select id="type">

                        <option value="BUY">BUY</option>

                        <option value="SELL">SELL</option>

                    </select>

                </div>

                <!-- Entry -->

                <div class="input-box">

                    <label>Entry Price</label>

                    <input
                        type="number"
                        id="entry"
                        placeholder="Enter Entry Price"
                        required>

                </div>

                <!-- Exit -->

                <div class="input-box">

                    <label>Exit Price</label>

                    <input
                        type="number"
                        id="exit"
                        placeholder="Enter Exit Price"
                        required>

                </div>

                <!-- Quantity -->

                <div class="input-box">

                    <label>Quantity</label>

                    <input
                        type="number"
                        id="quantity"
                        placeholder="Enter Quantity"
                        required>

                </div>

                <!-- Strategy -->

                <div class="input-box">

                    <label>Strategy</label>

                    <input
                        type="text"
                        id="strategy"
                        placeholder="Breakout, Scalping, Swing..."
                        required>

                </div>

                <!-- Emotion -->

                <div class="input-box">

                    <label>Emotion</label>

                    <input
                        type="text"
                        id="emotion"
                        placeholder="Happy, Fear, Angry..."
                        required>

                </div>

                <!-- Date -->

                <div class="input-box">

                    <label>Trade Date</label>

                    <input
                        type="date"
                        id="date"
                        required>

                </div>

            </div>

            <!-- Notes -->

            <div class="notes">

                <label>Trade Notes</label>

                <textarea
                    id="notes"
                    rows="6"
                    placeholder="Write your trading observations..."></textarea>

            </div>

            <!-- PNL -->

            <div class="summary">

                <h2>Profit / Loss</h2>

                <h1 id="pnl">₹0</h1>

            </div>

            <!-- Button -->

            <button
                type="submit"
                class="save-btn">

                Save Trade

            </button>

        </form>

    </main>

</div>

<script src="../js/addTrade.js"></script>

</body>

</html>
