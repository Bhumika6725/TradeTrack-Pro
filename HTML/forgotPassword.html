<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TradeTrack Pro | Forgot Password</title>

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Common Auth CSS -->

    <link rel="stylesheet" href="../CSS/auth.css">

</head>

<body>

<div class="container">

    <!-- Left Side -->

    <div class="left-panel">

        <h1>🔒 TradeTrack Pro</h1>

        <h2>Password Recovery</h2>

        <p>

            Forgot your password?<br>

            Verify your account and create a new one securely.

        </p>

        <div class="features">

            <div>✔ Secure Account Recovery</div>

            <div>✔ Update Password Instantly</div>

            <div>✔ Protected User Data</div>

            <div>✔ Fast & Easy Process</div>

        </div>

    </div>

    <!-- Right Side -->

    <div class="right-panel">

        <div class="login-card">

            <h2>Reset Password 🔑</h2>

            <p>Enter your details below.</p>

            <form id="forgotForm">

                <label>Email</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter Registered Email"
                    required>

                <label>Username</label>

                <input
                    type="text"
                    id="username"
                    placeholder="Enter Username"
                    required>

                <label>New Password</label>

                <div class="password-box">

                    <input
                        type="password"
                        id="password"
                        placeholder="Enter New Password"
                        required>

                    <span id="togglePassword">👁️</span>

                </div>

                <label>Confirm Password</label>

                <div class="password-box">

                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm Password"
                        required>

                    <span id="toggleConfirmPassword">👁️</span>

                </div>

                <p id="passwordStrength"></p>

                <p id="forgotMessage"></p>

                <button type="submit">

                    Update Password

                </button>

                <div class="signup">

                    Remember your password?

                    <a href="index.html">

                        Login

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

<script src="../JS/forgotPassword.js"></script>

</body>

</html>
